# configs/train_kc_dp.yaml

defaults:
  - task: lift_lowdim
  - _self_

name: train_kc_dp_lowdim

# Dynamically evaluates the augmented observation dimension (base + 42)
augmented_obs_dim: ${eval:'${task.obs_dim} + 42'}

task:
  dataset:
    _target_: kc_dp.dataset.kc_dataset.HKMLowdimDataset
    dataset_path: data/robomimic/datasets/lift/ph/low_dim_abs.hdf5
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: 90
    
    # Injects the precomputed statistics dynamically
    k_mean: ${load_stats:data/k_q_stats.pt,mean}
    k_std: ${load_stats:data/k_q_stats.pt,std}
    
    virtual_sampler:
      _target_: kc_dp.kinematics.virtual_sampler.VirtualRobotSampler
      # CRITICAL: Path to the Panda URDF matching the 7-DoF dataset
      base_urdf_path: third_party/diffusion_policy/diffusion_policy/env/kitchen/third_party/franka/franka_panda.urdf 
      ee_frame_name: panda_hand
      max_dof: 7
      
    base_kinematic_module:
      _target_: kc_dp.kinematics.feature_extractor.AnalyticKinematicModule
      # CRITICAL: Same path as above
      urdf_path: third_party/diffusion_policy/diffusion_policy/env/kitchen/third_party/franka/franka_panda.urdf
      ee_frame_name: panda_hand
      max_dof: 7

# Retains the completely unmodified baseline U-Net policy
policy:
  _target_: diffusion_policy.policy.diffusion_unet_lowdim_policy.DiffusionUnetLowdimPolicy
  
  model:
    _target_: diffusion_policy.model.diffusion.conditional_unet1d.ConditionalUnet1D
    # Absorbs the extra 42 dimensions seamlessly
    global_cond_dim: ${eval:'${augmented_obs_dim} * ${n_obs_steps}'}