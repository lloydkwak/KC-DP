# configs/train_kc_dp.yaml
defaults:
  - task: lift_lowdim
  - _self_

name: train_kc_dp_lowdim

# Define the augmented observation dimension dynamically
# Base lift_lowdim obs_dim is 19. We append 42D k(q).
augmented_obs_dim: ${eval:'${task.obs_dim} + 42'}

task:
  dataset:
    _target_: kc_dp.dataset.kc_dataset.HKMLowdimDataset
    dataset_path: data/robomimic/datasets/lift/ph/low_dim_abs.hdf5
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: 90
    
    k_mean: null
    k_std: null
    
    virtual_sampler:
      _target_: kc_dp.kinematics.virtual_sampler.VirtualRobotSampler
      base_urdf_path: third_party/diffusion_policy/diffusion_policy/env/block_pushing/assets/ur5e/ur5e.urdf 
      ee_frame_name: ee_link
      max_dof: 7
      
    base_kinematic_module:
      _target_: kc_dp.kinematics.feature_extractor.AnalyticKinematicModule
      urdf_path: third_party/diffusion_policy/diffusion_policy/env/block_pushing/assets/ur5e/ur5e.urdf
      ee_frame_name: ee_link
      max_dof: 7

# By leveraging the Ultimate Solution, we use the pristine, untouched policy!
policy:
  _target_: diffusion_policy.policy.diffusion_unet_lowdim_policy.DiffusionUnetLowdimPolicy
  
  model:
    _target_: diffusion_policy.model.diffusion.conditional_unet1d.ConditionalUnet1D
    # The pure policy network now seamlessly absorbs our appended kinematics!
    global_cond_dim: ${eval:'${augmented_obs_dim} * ${n_obs_steps}'}
