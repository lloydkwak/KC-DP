# configs/train_kc_dp.yaml

hydra:
  searchpath:
    - file://third_party/diffusion_policy/diffusion_policy/config

defaults:
  - train_diffusion_unet_lowdim_workspace
  - override /task: can_lowdim_abs
  - _self_

name: train_kc_dp_lowdim
_target_: kc_dp.workspace.train_kc_diffusion_unet_lowdim_workspace.TrainKCDiffusionUnetLowdimWorkspace
n_latency_steps: 0
horizon: 16
n_obs_steps: 2
n_action_steps: 8

# Augmented obs = base obs (e.g. 23 for can) + k(q) (42)
augmented_obs_dim: ${eval:'${task.obs_dim} + 42'}

# Override workspace-level obs_dim so policy.obs_dim, normalizer, etc.
# all see the augmented dimension instead of the base task.obs_dim.
obs_dim: ${augmented_obs_dim}

task:
  dataset:
    _target_: kc_dp.dataset.kc_dataset.HKMLowdimDataset
    dataset_path: data/robomimic/datasets/can/ph/low_dim_abs.hdf5
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    obs_keys: ${task.obs_keys}
    abs_action: ${task.abs_action}
    rotation_rep: rotation_6d
    seed: 42
    val_ratio: 0.02
    # cross-embodiment training distribution (Stage 1/2)
    k_feature_mode: virtual
    # Stage 3
    use_density_sampler: true
    density_k_neighbors: 5
    density_temperature: 0.7
    density_max_weight_ratio: 4.0
    k_clip_value: 3.0
    stats_path: data/k_q_stats_virtual.pt

    virtual_sampler:
      _target_: kc_dp.kinematics.virtual_sampler.VirtualRobotSampler
      base_urdf_path: data/urdf/franka_panda/urdf/panda.urdf
      ee_frame_name: panda_link8
      max_dof: 7
      stage1_min_range_deg: 60.0
      stage1_max_range_deg: 300.0
      stage2_log_sigma: 0.12
      stage2_scale_min: 0.75
      stage2_scale_max: 1.35

    base_kinematic_module:
      _target_: kc_dp.kinematics.feature_extractor.AnalyticKinematicModule
      urdf_path: data/urdf/franka_panda/urdf/panda.urdf
      ee_frame_name: panda_link8
      max_dof: 7

  env_runner:
    _target_: diffusion_policy.env_runner.robomimic_lowdim_runner.RobomimicLowdimRunner
    dataset_path: ${task.dataset.dataset_path}
    obs_keys: ${task.obs_keys}
    abs_action: ${task.abs_action}
    n_train: 6
    n_train_vis: 2
    n_test: 10
    n_test_vis: 2
    max_steps: 400
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    fps: 10
    crf: 22

policy:
  _target_: diffusion_policy.policy.diffusion_unet_lowdim_policy.DiffusionUnetLowdimPolicy
  obs_dim: ${augmented_obs_dim}
  model:
    _target_: diffusion_policy.model.diffusion.conditional_unet1d.ConditionalUnet1D
    global_cond_dim: ${eval:'${augmented_obs_dim} * ${n_obs_steps}'}
